  <h4>Contact form </h4>
  <h2>Contact Dragon's Keep</h2>

<p>
Have questions about your stay? Send a message by raven, scroll, or this form below.
</p>

<form method="post" action="https://webdevbasics.net/scripts/demo.php">
  <label for="myName">Name:</label>
  <input type="text" name="myName" id="myName" required>

  <label for="myEmail">Email:</label>
  <input type="email" name="myEmail" id="myEmail" required>

  <label for="roomChoice">Room Interested In:</label>
  <select name="roomChoice" id="roomChoice">
    <option value="Knight's Chamber">Knight's Chamber</option>
    <option value="Wizard's Tower">Wizard's Tower</option>
  </select>

  <p>Reason for Contact:</p>
   <label for="booking">Booking</label>
  <input type="radio" name="reason" id="booking" value="Booking">

  <label for="question">Question</label>
  <input type="radio" name="reason" id="question" value="Question">

  <label for="event">Event</label>
  <input type="radio" name="reason" id="event" value="Event">


  <label for="myComments">Addition Info:</label>
  <textarea name="myComments" id="myComments" rows="5" cols="20"></textarea>

  <input type="submit" value="Send Message">
</form>
